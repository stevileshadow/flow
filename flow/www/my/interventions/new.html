{% extends "templates/web.html" %}

{% block page_content %}
<div class="container my-4" style="max-width: 640px;">

  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/my/interventions">Mes interventions</a></li>
      <li class="breadcrumb-item active">Nouvelle demande</li>
    </ol>
  </nav>

  <h3 class="mb-4">Nouvelle demande de service</h3>

  {% if no_customer %}
  <div class="alert alert-warning">
    Aucun compte client associé. Contactez notre équipe.
  </div>
  {% else %}

  <form id="service-request-form">

    <div class="mb-3">
      <label class="form-label fw-bold">Titre de la demande <span class="text-danger">*</span></label>
      <input type="text" class="form-control" id="title" name="title"
             placeholder="Ex: Panne climatisation salle de réunion" required>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Type d'intervention</label>
      <select class="form-select" id="activity_type" name="activity_type">
        <option value="">— Sélectionner —</option>
        {% for t in activity_types %}
        <option value="{{ t.value }}">{{ t.label }}</option>
        {% endfor %}
      </select>
    </div>

    {% if locations %}
    <div class="mb-3">
      <label class="form-label fw-bold">Lieu</label>
      <select class="form-select" id="fsm_location" name="fsm_location">
        <option value="">— Sélectionner un lieu —</option>
        {% for loc in locations %}
        <option value="{{ loc.value }}">{{ loc.complete_name or loc.label }}</option>
        {% endfor %}
      </select>
    </div>
    {% endif %}

    <div class="mb-3">
      <label class="form-label fw-bold">Priorité</label>
      <select class="form-select" id="priority" name="priority">
        <option value="Faible">Faible</option>
        <option value="Normal" selected>Normal</option>
        <option value="Urgent">Urgent</option>
        <option value="Très urgent">Très urgent</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold">Description <span class="text-danger">*</span></label>
      <textarea class="form-control" id="description" name="description" rows="5"
                placeholder="Décrivez le problème ou la demande en détail..." required></textarea>
    </div>

    <div id="form-feedback" class="mb-3" style="display:none;"></div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" id="submit-btn">
        Envoyer la demande
      </button>
      <a href="/my/interventions" class="btn btn-light">Annuler</a>
    </div>

  </form>

  <script>
  document.getElementById('service-request-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const feedback = document.getElementById('form-feedback');
    btn.disabled = true;
    btn.textContent = 'Envoi en cours...';

    const data = {
      title: document.getElementById('title').value,
      description: document.getElementById('description').value,
      activity_type: document.getElementById('activity_type').value,
      fsm_location: document.getElementById('fsm_location') ? document.getElementById('fsm_location').value : '',
      priority: document.getElementById('priority').value,
    };

    try {
      const resp = await fetch('/api/method/flow.field_service.www.my.interventions.new.submit_service_request', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-Frappe-CSRF-Token': frappe.csrf_token},
        body: JSON.stringify(data),
      });
      const result = await resp.json();
      if (result.message && result.message.name) {
        window.location.href = '/my/interventions/' + result.message.name;
      } else {
        throw new Error(result.exc || 'Erreur inconnue');
      }
    } catch(err) {
      feedback.style.display = 'block';
      feedback.className = 'alert alert-danger mb-3';
      feedback.textContent = 'Erreur : ' + err.message;
      btn.disabled = false;
      btn.textContent = 'Envoyer la demande';
    }
  });
  </script>

  {% endif %}
</div>
{% endblock %}
